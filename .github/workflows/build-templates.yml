name: Build Templates

on:
  workflow_run:
    workflows: ["Test Templates"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare output directory
        run: |
          rm -rf output
          mkdir -p output

      # ===================
      # NODE
      # ===================
      - name: Zip node
        run: |
          cd templates/node
          zip -r ../../output/node.zip . -x "*/node_modules/*" "*/.DS_Store"
          cd ../..

      - name: Zip node-ts
        run: |
          cd templates/node-ts
          zip -r ../../output/node-ts.zip . -x "*/node_modules/*" "*/dist/*" "*/.DS_Store"
          cd ../..

      - name: Zip node-fastify
        run: |
          cd templates/node-fastify
          zip -r ../../output/node-fastify.zip . -x "*/node_modules/*" "*/dist/*" "*/.DS_Store"
          cd ../..

      # ===================
      # FRONTEND
      # ===================
      - name: Zip react
        run: |
          cd templates/react
          zip -r ../../output/react.zip . -x "*/node_modules/*" "*/dist/*" "*/.DS_Store"
          cd ../..

      - name: Zip vue
        run: |
          cd templates/vue
          zip -r ../../output/vue.zip . -x "*/node_modules/*" "*/dist/*" "*/.DS_Store"
          cd ../..

      - name: Zip angular
        run: |
          cd templates/angular
          zip -r ../../output/angular.zip . -x "*/node_modules/*" "*/dist/*" "*/.angular/*" "*/.DS_Store"
          cd ../..

      - name: Zip nextjs
        run: |
          cd templates/nextjs
          zip -r ../../output/nextjs.zip . -x "*/node_modules/*" "*/.next/*" "*/.DS_Store"
          cd ../..

      - name: Zip nuxt
        run: |
          cd templates/nuxt
          zip -r ../../output/nuxt.zip . -x "*/node_modules/*" "*/.nuxt/*" "*/.output/*" "*/.DS_Store"
          cd ../..

      # ===================
      # BACKEND
      # ===================
      - name: Zip nestjs
        run: |
          cd templates/nestjs
          zip -r ../../output/nestjs.zip . -x "*/node_modules/*" "*/dist/*" "*/.DS_Store"
          cd ../..

      - name: Zip laravel
        run: |
          cd templates/laravel
          zip -r ../../output/laravel.zip . \
            -x "*/node_modules/*" "*/vendor/*" "*/storage/*" "*/bootstrap/cache/*" "*/.DS_Store"
          cd ../..

      - name: Zip adonis
        run: |
          cd templates/adonis
          zip -r ../../output/adonis.zip . -x "*/node_modules/*" "*/build/*" "*/.DS_Store"
          cd ../..

      # ===================
      # JAVA
      # ===================
      - name: Zip java-vanilla
        run: |
          cd templates/java-vanilla
          zip -r ../../output/java-vanilla.zip . \
            -x "*/target/*" "*/.mvn/*" "*/mvnw" "*/mvnw.cmd" "*/.DS_Store"
          cd ../..

      - name: Zip java-springboot
        run: |
          cd templates/java-springboot
          zip -r ../../output/java-springboot.zip . \
            -x "*/target/*" "*/.mvn/*" "*/mvnw" "*/mvnw.cmd" "*/.DS_Store"
          cd ../..

      # ===================
      # PYTHON
      # ===================
      - name: Zip python
        run: |
          cd templates/python
          zip -r ../../output/python.zip . \
            -x "*/__pycache__/*" "*/venv/*" "*/env/*" "*/.venv/*" "*/.DS_Store"
          cd ../..

      - name: Zip python-fastapi
        run: |
          cd templates/python-fastapi
          zip -r ../../output/python-fastapi.zip . \
            -x "*/__pycache__/*" "*/venv/*" "*/env/*" "*/.venv/*" "*/.DS_Store"
          cd ../..

      # ===================
      # SYSTEM / LOW LEVEL
      # ===================
      - name: Zip c
        run: |
          cd templates/c
          zip -r ../../output/c.zip . -x "*/obj/*" "*/bin/*" "*/.DS_Store"
          cd ../..

      - name: Zip cpp
        run: |
          cd templates/cpp
          zip -r ../../output/cpp.zip . -x "*/bin/*" "*/.DS_Store"
          cd ../..

      - name: Zip rust
        run: |
          cd templates/rust
          zip -r ../../output/rust.zip . -x "*/target/*" "*/.DS_Store"
          cd ../..

      - name: Zip go
        run: |
          cd templates/go
          zip -r ../../output/go.zip . -x "*/.DS_Store"
          cd ../..

      - name: Zip php
        run: |
          cd templates/php
          zip -r ../../output/php.zip . -x "*/vendor/*" "*/.DS_Store"
          cd ../..

      - name: Zip static-server
        run: |
          cd templates/static-server
          zip -r ../../output/static-server.zip . -x "*/.DS_Store"
          cd ../..

      # ===================
      # FINAL
      # ===================
      - name: Show archive sizes
        run: ls -lh output/*.zip

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add output/*.zip

          if git diff --staged --quiet; then
            echo "✅ No changes"
          else
            git commit -m "🤖 Update template archives [skip ci]"
            git push
          fi