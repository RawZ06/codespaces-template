name: Build Templates

on:
  workflow_run:
    workflows: ["Test Templates"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create output directory
        run: mkdir -p output

      # -------------------
      # Node.js
      # -------------------
      - name: Zip Node.js template
        run: |
          cd templates/node
          zip -r ../../output/node.zip . \
            -x "*/node_modules/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Node TS template
        run: |
          cd templates/node-ts
          zip -r ../../output/node-ts.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Node Fastify template
        run: |
          cd templates/node-fastify
          zip -r ../../output/node-fastify.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Frontend
      # -------------------
      - name: Zip React template
        run: |
          cd templates/react
          zip -r ../../output/react.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Vue template
        run: |
          cd templates/vue
          zip -r ../../output/vue.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Angular template
        run: |
          cd templates/angular
          zip -r ../../output/angular.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.angular/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Next.js template
        run: |
          cd templates/nextjs
          zip -r ../../output/nextjs.zip . \
            -x "*/node_modules/*" \
            -x "*/.next/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Nuxt template
        run: |
          cd templates/nuxt
          zip -r ../../output/nuxt.zip . \
            -x "*/node_modules/*" \
            -x "*/.nuxt/*" \
            -x "*/.output/*" \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Backend frameworks
      # -------------------
      - name: Zip NestJS template
        run: |
          cd templates/nestjs
          zip -r ../../output/nestjs.zip . \
            -x "*/node_modules/*" \
            -x "*/dist/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Laravel template
        run: |
          cd templates/laravel
          zip -r ../../output/laravel.zip . \
            -x "*/node_modules/*" \
            -x "*/vendor/*" \
            -x "*/storage/*" \
            -x "*/bootstrap/cache/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Adonis template
        run: |
          cd templates/adonis
          zip -r ../../output/adonis.zip . \
            -x "*/node_modules/*" \
            -x "*/build/*" \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Java
      # -------------------
      - name: Zip Java Vanilla template
        run: |
          cd templates/java-vanilla
          zip -r ../../output/java-vanilla.zip . \
            -x "*/target/*" \
            -x "*/.mvn/*" \
            -x "*/mvnw" \
            -x "*/mvnw.cmd" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Java Spring Boot template
        run: |
          cd templates/java-springboot
          zip -r ../../output/java-springboot.zip . \
            -x "*/target/*" \
            -x "*/.mvn/*" \
            -x "*/mvnw" \
            -x "*/mvnw.cmd" \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Python
      # -------------------
      - name: Zip Python template
        run: |
          cd templates/python
          zip -r ../../output/python.zip . \
            -x "*/__pycache__/*" \
            -x "*/venv/*" \
            -x "*/env/*" \
            -x "*/.venv/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Python FastAPI template
        run: |
          cd templates/python-fastapi
          zip -r ../../output/python-fastapi.zip . \
            -x "*/__pycache__/*" \
            -x "*/venv/*" \
            -x "*/env/*" \
            -x "*/.venv/*" \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Low-level / others
      # -------------------
      - name: Zip C template
        run: |
          cd templates/c
          zip -r ../../output/c.zip . \
            -x "*/obj/*" \
            -x "*/bin/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip C++ template
        run: |
          cd templates/cpp
          zip -r ../../output/cpp.zip . \
            -x "*/bin/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Rust template
        run: |
          cd templates/rust
          zip -r ../../output/rust.zip . \
            -x "*/target/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Go template
        run: |
          cd templates/go
          zip -r ../../output/go.zip . \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip PHP template
        run: |
          cd templates/php
          zip -r ../../output/php.zip . \
            -x "*/vendor/*" \
            -x "*/.DS_Store"
          cd ../..

      - name: Zip Static Server template
        run: |
          cd templates/static-server
          zip -r ../../output/static-server.zip . \
            -x "*/.DS_Store"
          cd ../..

      # -------------------
      # Finalisation
      # -------------------
      - name: Display archive sizes
        run: |
          echo "📦 Archive sizes:"
          ls -lh output/*.zip

      - name: Commit and push archives
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/*.zip

          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🤖 Update template archives [skip ci]"
            git push
            echo "✅ Archives updated and pushed"
          fi