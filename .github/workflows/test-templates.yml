name: Test Templates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-node:
    name: Test Node.js Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Node.js template
        working-directory: ./node
        run: |
          npm install
          node index.js

  test-nestjs:
    name: Test NestJS Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./nestjs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./nestjs
        run: pnpm install

      - name: Audit dependencies
        working-directory: ./nestjs
        run: pnpm audit --audit-level high || true

      - name: Build NestJS
        working-directory: ./nestjs
        run: pnpm run build

      - name: Test NestJS
        working-directory: ./nestjs
        run: pnpm run test

  test-react:
    name: Test React Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./react/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./react
        run: pnpm install

      - name: Audit dependencies
        working-directory: ./react
        run: pnpm audit --audit-level high || true

      - name: Build React
        working-directory: ./react
        run: pnpm run build

  test-vue:
    name: Test Vue Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./vue/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./vue
        run: pnpm install

      - name: Audit dependencies
        working-directory: ./vue
        run: pnpm audit --audit-level high || true

      - name: Build Vue
        working-directory: ./vue
        run: pnpm run build

  test-angular:
    name: Test Angular Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./angular/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./angular
        run: pnpm install

      - name: Audit dependencies
        working-directory: ./angular
        run: pnpm audit --audit-level high || true

      - name: Build Angular
        working-directory: ./angular
        run: pnpm run build

  test-java-vanilla:
    name: Test Java Vanilla Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'

      - name: Build Java Vanilla
        working-directory: ./java-vanilla
        run: mvn clean compile

      - name: Run tests
        working-directory: ./java-vanilla
        run: mvn test

      - name: Check for CVEs with OWASP Dependency-Check
        working-directory: ./java-vanilla
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || true

  test-java-springboot:
    name: Test Java Spring Boot Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'

      - name: Build Spring Boot
        working-directory: ./java-springboot
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./java-springboot
        run: mvn test

      - name: Check for CVEs with OWASP Dependency-Check
        working-directory: ./java-springboot
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || true

      - name: Test Spring Boot startup
        working-directory: ./java-springboot
        run: |
          # Lancer l'app en background
          java -jar target/*.jar &
          APP_PID=$!

          # Attendre que l'app démarre (max 30s)
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/health > /dev/null; then
              echo "✅ Spring Boot started successfully"
              break
            fi
            sleep 1
          done

          # Tester l'endpoint hello
          curl -f http://localhost:8080/api/hello?name=CI || exit 1

          # Arrêter l'app
          kill $APP_PID

  test-python:
    name: Test Python Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./python
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check for CVEs with pip-audit
        working-directory: ./python
        run: |
          pip install pip-audit
          pip-audit || true

      - name: Run Python script
        working-directory: ./python
        run: python main.py

  test-c:
    name: Test C Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build C project
        working-directory: ./c
        run: make

      - name: Run C program
        working-directory: ./c
        run: ./bin/program

      - name: Test clean
        working-directory: ./c
        run: make clean && test ! -d obj && test ! -d bin

  test-php:
    name: Test PHP Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Validate composer.json
        working-directory: ./php
        run: composer validate

      - name: Install dependencies
        working-directory: ./php
        run: composer install --prefer-dist --no-progress

      - name: Check for CVEs
        working-directory: ./php
        run: composer audit || true

      - name: Run PHP script
        working-directory: ./php
        run: php public/index.php

  # Job de résumé qui échoue si un des tests échoue
  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs:
      - test-node
      - test-nestjs
      - test-react
      - test-vue
      - test-angular
      - test-java-vanilla
      - test-java-springboot
      - test-python
      - test-c
      - test-php
    steps:
      - name: All tests passed
        run: echo "✅ All templates tested successfully!"
